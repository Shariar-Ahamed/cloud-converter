<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220%22 width=%22100%22 height=%22100%22><text y=%220.9em%22 font-size=%2290%22>⚡</text></svg>"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>
      Cloud File Converter - All-in-One Online Document, PDF, Image & Video
      Converter
    </title>
    <meta
      name="description"
      content="Convert files instantly with Cloud File Converter. A premium, fast, secure, and free online tool supporting PDF, Images, Video, Audio, Word, and compression without installations."
    />
    <meta
      name="keywords"
      content="pdf converter, file converter, image resizer, video compressor, compress pdf, word to pdf, png to jpg, mp3 cutter"
    />
    <meta name="author" content="Cloud File Converter Co." />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body
    class="bg-[#050212] text-[#f8fafc] overflow-x-hidden antialiased"
  >
    <!-- Initial Loader -->
    <div
      id="app-loader"
      class="fixed inset-0 z-50 flex items-center justify-center bg-[#050212] transition-opacity duration-500"
    >
      <div class="text-center">
        <div class="relative w-20 h-20 mx-auto mb-4">
          <div
            class="absolute inset-0 rounded-full border-4 border-purple-500/20"
          ></div>
          <div
            class="absolute inset-0 rounded-full border-4 border-t-purple-500 border-r-blue-500 animate-spin"
          ></div>
        </div>
        <h2
          class="text-xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400 font-display"
        >
          CLOUD CONVERTER
        </h2>
        <p class="text-sm text-slate-400 mt-2 animate-pulse">
          Initializing SaaS dashboard...
        </p>
      </div>
    </div>

    <!-- Scroll Progress Indicator -->
    <div id="scroll-progress"></div>

    <!-- Floating Background Particles / Blobs -->
    <div class="bg-blobs">
      <div class="blob blob-purple"></div>
      <div class="blob blob-cyan"></div>
      <div class="blob blob-pink"></div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="flex flex-col min-h-screen">
      <!-- Injected Dynamically by main.js -->
    </div>

    <!-- Back to Top Button -->
    <button
      id="back-to-top"
      class="fixed bottom-6 right-6 z-40 bg-purple-600 hover:bg-purple-700 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg hover:shadow-purple-500/50 opacity-0 invisible translate-y-4 transition-all duration-300 pointer-events-none cursor-pointer"
    >
      <i class="fa-solid fa-arrow-up text-lg"></i>
    </button>

    <!-- PDF Utilities Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
